<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h1 th:if="${restaurantId == null}" th:text="'New Restaurant'">New</h1>
    <h1 th:unless="${restaurantId == null}" th:text="'Edit Restaurant #' + ${restaurantId}">Edit</h1>

    <a href="/restaurants" class="btn btn-outline-secondary btn-sm mb-3">← Back</a>

    <div class="card">
        <div class="card-body">
            <form th:action="${restaurantId == null} ? @{/restaurants/new} : @{/restaurants/{id}/edit(id=${restaurantId})}"
                  method="post" th:object="${restaurant}">

                <div class="mb-3">
                    <label class="form-label">Name *</label>
                    <input type="text" class="form-control" th:field="*{name}"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                    <div class="invalid-feedback" th:each="err : ${#fields.errors('name')}" th:text="${err}">Error</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Cuisine</label>
                    <input type="text" class="form-control" th:field="*{cuisine}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <input type="text" class="form-control" th:field="*{address}">
                </div>

                <button type="submit" class="btn btn-primary">Save</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
