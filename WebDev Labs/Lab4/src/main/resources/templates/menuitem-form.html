<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu Item Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h1 th:if="${itemId == null}" th:text="'New Menu Item'">New</h1>
    <h1 th:unless="${itemId == null}" th:text="'Edit Menu Item #' + ${itemId}">Edit</h1>

    <a href="/menu-items" class="btn btn-outline-secondary btn-sm mb-3">← Back</a>

    <div class="card">
        <div class="card-body">
            <form th:action="${itemId == null} ? @{/menu-items/new} : @{/menu-items/{id}/edit(id=${itemId})}"
                  method="post" th:object="${item}">

                <div class="mb-3">
                    <label class="form-label">Name *</label>
                    <input type="text" class="form-control" th:field="*{name}"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                    <div class="invalid-feedback" th:each="err : ${#fields.errors('name')}" th:text="${err}">Error</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Price *</label>
                    <input type="number" step="0.01" min="0.01" class="form-control" th:field="*{price}"
                           th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''">
                    <div class="invalid-feedback" th:each="err : ${#fields.errors('price')}" th:text="${err}">Error</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <input type="text" class="form-control" th:field="*{category}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Restaurant ID *</label>
                    <input type="number" min="1" class="form-control" th:field="*{restaurantId}"
                           th:classappend="${#fields.hasErrors('restaurantId')} ? 'is-invalid' : ''">
                    <div class="invalid-feedback" th:each="err : ${#fields.errors('restaurantId')}" th:text="${err}">Error</div>
                </div>

                <button type="submit" class="btn btn-primary">Save</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
