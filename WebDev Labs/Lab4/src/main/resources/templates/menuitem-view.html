<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu Item Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h1 th:text="${item.name}">Dish Name</h1>
    <div class="mb-3">
        <a href="/menu-items" class="btn btn-outline-secondary btn-sm">← All Items</a>
        <a th:href="@{/menu-items/{id}/edit(id=${item.id})}" class="btn btn-warning btn-sm">Edit</a>
        <form th:action="@{/menu-items/{id}/delete(id=${item.id})}" method="post" style="display:inline"
              onsubmit="return confirm('Delete this item?');">
            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
        </form>
    </div>

    <div class="card">
        <div class="card-body">
            <p><strong>ID:</strong> <span th:text="${item.id}">1</span></p>
            <p><strong>Description:</strong> <span th:text="${item.description}">Description</span></p>
            <p><strong>Category:</strong> <span th:text="${item.category}">Category</span></p>
            <p><strong>Price:</strong> <span th:text="${item.formattedPrice}">€0.00</span></p>
            <p><strong>Restaurant:</strong>
                <a th:href="@{/restaurants/{id}(id=${item.restaurantId})}" th:text="${item.restaurantName}">Restaurant</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
